name: Contracts CI

on:
  pull_request:
    paths:
      - "archive/legacy-evm/**"
      - "soroban/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contracts.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "archive/legacy-evm/**"
      - "soroban/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contracts.yml"

jobs:
  soroban:
    name: Soroban Contract Checks
    if: ${{ hashFiles('soroban/**/Cargo.toml') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            soroban -> soroban/target

      - name: Run Soroban tests
        working-directory: soroban
        run: cargo test

      - name: Build Soroban contract WASM
        working-directory: soroban
        run: cargo build --target wasm32v1-none --release

  solidity:
    name: Archived Solidity Prototype Checks
    if: ${{ hashFiles('archive/legacy-evm/contracts/**/*.sol') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Check contract formatting
        run: npx --yes prettier@3.6.2 --check "archive/legacy-evm/contracts/**/*.sol"

      - name: Run Solidity lint
        run: npx --yes solhint@5.0.3 "archive/legacy-evm/contracts/**/*.sol"

      - name: Compile Solidity contracts
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(archive/legacy-evm/contracts/**/*.sol)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Solidity contracts found."
            exit 0
          fi
          npx --yes --package solc@0.8.30 solcjs \
            --bin \
            --abi \
            --base-path . \
            --include-path node_modules \
            "${files[@]}"

      - name: Setup Foundry
        if: hashFiles('foundry.toml') != ''
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Foundry tests
        if: hashFiles('foundry.toml') != ''
        run: forge test -vvv

      - name: Run Hardhat tests
        if: hashFiles('hardhat.config.js', 'hardhat.config.cjs', 'hardhat.config.ts') != ''
        run: npx hardhat test

      - name: Note missing Solidity test runner
        if: hashFiles('foundry.toml', 'hardhat.config.js', 'hardhat.config.cjs', 'hardhat.config.ts') == ''
        shell: bash
        run: echo "No Solidity test runner is configured in this repository yet. Compilation, formatting, and lint checks still ran."