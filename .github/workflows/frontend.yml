name: Frontend CI

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - "postcss.config.mjs"
      - ".github/workflows/frontend.yml"
    paths-ignore:
      - "src/app/api/**"
  push:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - "postcss.config.mjs"
      - ".github/workflows/frontend.yml"
    paths-ignore:
      - "src/app/api/**"

jobs:
  frontend:
    name: Lint And Build Frontend
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/eduvault-ci
      MONGODB_DB: eduvault-ci
      JWT_SECRET: ci-jwt-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_GATEWAY_URL: https://gateway.pinata.cloud
      PINATA_JWT: ci-pinata-token
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-walletconnect-project-id
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm run lint -- --ignore-pattern "src/app/api/**" src/app src/components src/hooks src/providers src/utils

      - name: Type check
        run: pnpm run typecheck

      - name: Run frontend tests
        run: pnpm run test:frontend

      - name: Build frontend
        run: pnpm run build
