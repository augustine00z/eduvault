name: Backend CI

on:
  pull_request:
    paths:
      - "src/app/api/**"
      - "src/lib/**"
      - "src/middleware.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "src/app/api/**"
      - "src/lib/**"
      - "src/middleware.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - ".github/workflows/backend.yml"

jobs:
  backend:
    name: Lint And Build Backend
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/eduvault-ci
      MONGODB_DB: eduvault-ci
      JWT_SECRET: ci-jwt-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_GATEWAY_URL: https://gateway.pinata.cloud
      PINATA_JWT: ci-pinata-token
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-walletconnect-project-id
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm run lint -- src/app/api src/lib src/middleware.js

      - name: Run backend tests
        run: pnpm run test:backend

      - name: Build application
        run: pnpm run build
